StylesPath = styles
MinAlertLevel = suggestion

# Optional but useful:
Packages = Google, write-good, proselint

[formats]
yaml = md
yml = md

[*]
BasedOnStyles = Vale, write-good

[*.{yaml,yml}]
# Resume-friendly ignores to reduce false positives from YAML syntax and URLs.
TokenIgnores = \
  (?i)\bhttps?://\S+, \
  \b[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}\b, \
  \b\d{3}[-.\s]?\d{3}[-.\s]?\d{4}\b, \
  \b(19|20)\d{2}\b, \
  \b\d+(\.\d+)?%\b, \
  \b[A-Z][A-Z0-9+/#.-]{1,}\b, \
  \b(C\+\+|C#|Node\.js|JavaScript|TypeScript|PyTorch|TensorFlow|OpenAI|CUDA|SQL|MATLAB)\b

# Ignore common YAML structure lines so Vale focuses on prose values.
BlockIgnores = \
  (?m)^\s*[\w-]+\s*:\s*$, \
  (?m)^\s*[\w-]+\s*:\s*(\[[^\]]*\]|\{[^}]*\})\s*$, \
  (?m)^\s*-\s*[\w-]+\s*:\s*$

# Tighter rules for resumes: clarity matters, but you don't want excessive noise.
BasedOnStyles = Vale, write-good